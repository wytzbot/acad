<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10B981">
    <title>ACAD - Student Toolkit</title>
    <meta name="description" content="12 essential academic tools: GPA Calculator, Citation Generator, Word Counter, Study Planner, Pomodoro Timer & more. Free, no login.">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2310B981'/><text y='.9em' font-size='70' fill='white'>A</text></svg>">
    <style>
        :root {
            --green: #10B981;
            --green-dark: #059669;
            --white: #FFFFFF;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-600: #4B5563;
            --gray-900: #111827;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50); color: var(--gray-900); line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
        #welcome {
            position: fixed; inset: 0; background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 9999; text-align: center; padding: 20px;
        }
        #welcome h1 { font-size: 3rem; margin-bottom: 1rem; font-weight: 800; }
        #welcome p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem; max-width: 500px; }
        #fact { 
            background: rgba(255,255,255,0.15); padding: 16px; border-radius: 12px; 
            margin: 20px 0; font-style: italic; backdrop-filter: blur(10px);
        }
        .btn {
            background: white; color: var(--green); border: none; padding: 14px 32px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            transition: transform 0.2s; box-shadow: var(--shadow);
        }
        .btn:hover { transform: translateY(-2px); }
        header { 
            background: white; border-bottom: 1px solid var(--gray-100); position: sticky; top: 0; z-index: 100;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
        .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.5rem; color: var(--green); }
        .back-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray-600); padding: 8px; display: none; }
        .back-btn.show { display: block; }
        #home { padding: 32px 0; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h2 { font-size: 2rem; margin-bottom: 8px; }
        .hero p { color: var(--gray-600); font-size: 1.1rem; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .tool-card { background: white; border-radius: 16px; padding: 24px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .tool-card:hover { transform: translateY(-4px); border-color: var(--green); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .tool-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .tool-card h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .tool-card p { color: var(--gray-600); font-size: 0.95rem; }
        .tool-view { display: none; padding: 24px 0; }
        .tool-view.active { display: block; }
        .tool-header { margin-bottom: 24px; }
        .tool-header h2 { font-size: 1.8rem; margin-bottom: 8px; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--gray-100); border-radius: 8px; font-size: 1rem; margin: 8px 0 16px 0; transition: border 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green); }
        label { font-weight: 600; color: var(--gray-900); }
        .btn-primary { background: var(--green); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1rem; }
        .btn-primary:hover { background: var(--green-dark); }
        .btn-secondary { background: var(--gray-100); color: var(--gray-900); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-right: 8px; }
        .result { background: var(--gray-50); padding: 16px; border-radius: 8px; margin-top: 16px; border-left: 4px solid var(--green); }
        .hidden { display: none !important; }
        footer { background: white; border-top: 1px solid var(--gray-100); margin-top: 60px; padding: 32px 0; text-align: center; color: var(--gray-600); }
        .footer-links { margin: 16px 0; }
        .footer-links a { color: var(--green); margin: 0 12px; text-decoration: none; }
        .ad-space { background: var(--gray-100); border: 2px dashed var(--gray-600); padding: 40px; text-align: center; border-radius: 8px; margin: 20px 0; color: var(--gray-600); font-size: 0.9rem; }
        @media (max-width: 768px) { #welcome h1 { font-size: 2rem; } .tools-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="welcome">
        <h1>ACAD</h1>
        <p>12 Essential Academic Tools. One Clean App. Zero Login.</p>
        <div id="fact">Loading scientific fact...</div>
        <button class="btn" onclick="skipWelcome()">Enter ACAD →</button>
    </div>
    <header>
        <div class="container">
            <div class="header-inner">
                <button class="back-btn" onclick="showHome()">←</button>
                <div class="logo"><span>🎓</span> ACAD</div>
                <button class="btn-secondary" onclick="resetAllData()">Reset</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div id="home">
            <div class="hero">
                <h2>Student Toolkit</h2>
                <p>Fast, accurate, private. No signup needed.</p>
            </div>
            <div class="tools-grid" id="toolsGrid"></div>
            <div class="ad-space">AdSense Banner - 728x90</div>
        </div>
        <div id="toolContainer"></div>
    </main>
    <footer>
        <div class="container">
            <p><strong>ACAD</strong> - Built for students, by students</p>
            <div class="footer-links">
                <a href="#" onclick="showFAQ()">FAQs</a>
                <a href="#" onclick="showPrivacy()">Privacy</a>
                <a href="mailto:support@acad.tools">Contact</a>
            </div>
            <p style="font-size: 0.85rem;">© 2026 ACAD. Unlimited free use. No data collected.</p>
        </div>
    </footer>
    <script src="App.js"></script>
</body>
  </html>
